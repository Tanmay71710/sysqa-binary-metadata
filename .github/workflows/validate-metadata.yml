name: Validate Binary Metadata

on:
  push:
    branches: [ main ]
    paths:
      - 'versions/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'versions/**'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Validate JSON structure
      run: |
        echo "Validating JSON structure..."
        FAILED=0
        for file in versions/*.json; do
          if [ -f "$file" ]; then
            echo "Validating $file"
            if python3 -m json.tool "$file" > /dev/null 2>&1; then
              echo "  OK: valid JSON"
            else
              echo "  FAIL: invalid JSON in $file"
              FAILED=1
            fi
          fi
        done
        exit $FAILED

    - name: Validate required fields
      run: |
        python3 -c "
        import json, sys, re
        from pathlib import Path

        required_fields = ['name', 'version', 'sha256', 'size', 'store']
        valid_stores = ['artifactory', 'minio', 'local']

        json_files = sorted(Path('versions').glob('*.json'))
        if not json_files:
            print('No JSON files found in versions/')
            sys.exit(0)

        print(f'Found {len(json_files)} metadata file(s) to validate')
        errors = 0

        for json_file in json_files:
            print(f'\nValidating {json_file}')
            with open(json_file) as f:
                data = json.load(f)

            missing = [field for field in required_fields if field not in data]
            if missing:
                print(f'  FAIL: Missing required fields: {missing}')
                errors += 1
                continue

            sha256 = data['sha256']
            if len(sha256) != 64 or not all(c in '0123456789abcdef' for c in sha256.lower()):
                print(f'  FAIL: Invalid SHA-256 format: {sha256}')
                errors += 1
                continue

            size = data['size']
            if not isinstance(size, int) or size < 0:
                print(f'  FAIL: Invalid size: {size}')
                errors += 1
                continue

            if data['store'] not in valid_stores:
                print(f'  FAIL: Invalid store: {data[\"store\"]}')
                errors += 1
                continue

            version = data['version']
            if not re.match(r'^\d+\.\d+\.\d+', version):
                print(f'  WARN: Non-standard version format: {version}')

            print(f'  OK: {json_file} is valid')

        print(f'\nValidation complete: {len(json_files)} files checked, {errors} errors')
        if errors > 0:
            sys.exit(1)
        print('All metadata files validated successfully')
        "

    - name: Check for duplicate artifacts
      run: |
        python3 -c "
        import json
        from pathlib import Path
        from collections import defaultdict

        metadata_files = sorted(Path('versions').glob('*.json'))
        artifact_versions = defaultdict(list)

        for json_file in metadata_files:
            with open(json_file) as f:
                data = json.load(f)
            name = data.get('name', str(json_file))
            version = data.get('version', 'unknown')
            artifact_versions[name].append((version, str(json_file)))

        duplicates = 0
        for name, versions in artifact_versions.items():
            version_numbers = [v[0] for v in versions]
            if len(set(version_numbers)) != len(version_numbers):
                print(f'WARNING: Duplicate version numbers for {name}: {version_numbers}')
                duplicates += 1

        if duplicates == 0:
            print('No duplicate artifacts found')
        "

    - name: Generate validation summary
      if: always()
      run: |
        FILE_COUNT=$(find versions -name '*.json' 2>/dev/null | wc -l)
        echo "## Metadata Validation Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Files validated**: $FILE_COUNT" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

    - name: Send Email Notification
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.office365.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "Metadata Validation ${{ job.status }} - ${{ github.repository }}"
        to: ${{ secrets.NOTIFICATION_EMAIL }}
        from: GitHub Actions <${{ secrets.EMAIL_USERNAME }}>
        body: |
          Metadata Validation Workflow - ${{ job.status }}

          Repository : ${{ github.repository }}
          Branch     : ${{ github.ref_name }}
          Commit     : ${{ github.sha }}
          Triggered  : ${{ github.actor }}
          Files      : $(find versions -name '*.json' 2>/dev/null | wc -l) metadata files validated

          Workflow   : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      continue-on-error: true
